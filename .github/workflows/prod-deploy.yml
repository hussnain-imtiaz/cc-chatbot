# CI/CD pipeline for the production branch
# Triggers on every push to the 'production' branch
# Steps: run tests → build Docker → push to Azure Container Registry → deploy to Container Apps
#
# All secrets come from GitHub repository secrets - never hardcoded here

name: Deploy to Azure

on:
  push:
    branches:
      - production-taster
  pull_request:
    branches:
      - production-taster

jobs:
  # ---- Job 1: run tests first - don't deploy broken code ----
  test:
    name: Run tests and eval gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      # run the unit tests - these need no OpenAI key
      - name: Run unit tests
        run: uv run pytest tests/ -v --tb=short
        env:
          # DATA_SOURCE=csv means tests use local CSV files, no Snowflake needed
          DATA_SOURCE: csv

      # optional eval gate - uncomment when you have an OpenAI key in CI
      # - name: Run eval gate (first 5 questions)
      #   run: uv run python eval/runner.py Q01 Q02 Q03 Q04 Q05
      #   env:
      #     OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      #     DATA_SOURCE: csv

  # ---- Job 2: build and push Docker image ----
  # only runs on push to production (not on PRs)
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/production'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # login to Azure Container Registry
      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # build and push — tag with both 'latest' and the git SHA for traceability
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/cc-chatbot:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/cc-chatbot:${{ github.sha }}

  # ---- Job 3: deploy to Azure Container Apps ----
  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/production'

    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # update the container app with the new image
      # all the secrets are pulled from GitHub Secrets and passed as env vars to the container
      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name cc-chatbot-app \
            --resource-group cc-chatbot-rg \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/cc-chatbot:${{ github.sha }} \
            --set-env-vars \
              OPENAI_API_KEY=secretref:openai-api-key \
              DATA_SOURCE=snowflake \
              SNOWFLAKE_ACCOUNT=secretref:snowflake-account \
              SNOWFLAKE_USER=secretref:snowflake-user \
              SNOWFLAKE_PASSWORD=secretref:snowflake-password \
              APPLICATIONINSIGHTS_CONNECTION_STRING=secretref:appinsights-conn-str \
              CURRENT_DATE=2026-01-31

      # print the URL so you can open the app straight from the Actions log
      - name: Get app URL
        run: |
          URL=$(az containerapp show \
            --name cc-chatbot-app \
            --resource-group cc-chatbot-rg \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "✅ App deployed: https://$URL"
