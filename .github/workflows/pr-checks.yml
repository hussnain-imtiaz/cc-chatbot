name: checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install uv
        uses: astral-sh/setup-uv@v3

      - name: install deps
        run: uv sync --all-extras

      - name: run unit tests
        run: uv run pytest tests/ -v

  eval-gate:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      CURRENT_DATE: "2026-01-31"
    steps:
      - uses: actions/checkout@v4

      - name: install uv
        uses: astral-sh/setup-uv@v3

      - name: install deps
        run: uv sync

      - name: run eval gate (first 10 questions)
        id: eval
        run: |
          uv run python eval/runner.py Q01 Q02 Q03 Q04 Q05 Q06 Q07 Q08 Q09 Q10
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: post result as PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const passed = '${{ steps.eval.outputs.exit_code }}' === '0';
            const body = passed
              ? '✅ Eval gate passed — accuracy >= 90%'
              : '❌ Eval gate FAILED — accuracy below 90%. Check the eval output above.';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });